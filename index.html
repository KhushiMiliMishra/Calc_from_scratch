<!DOCTYPE html>
<html>
<head>
    <title>Calculator</title>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f2f2f2;
            font-family: Arial;
        }

        .calculator {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            width: 300px;
        }

        #display {
            width: 100%;
            height: 40px;
            font-size: 18px;
            margin-bottom: 10px;
            text-align: right;
            padding-right: 5px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        button {
            height: 45px;
            font-size: 18px;
            cursor: pointer;
        }

        .equal {
            grid-column: span 4;
            background-color: #4CAF50;
            color: white;
        }
    </style>
</head>

<body>

<div class="calculator">
    <form method="post" action="calculate">
        <input type="text" id="display" name="expression" required>

        <div class="buttons">
            <button type="button" onclick="add('7')">7</button>
            <button type="button" onclick="add('8')">8</button>
            <button type="button" onclick="add('9')">9</button>
            <button type="button" onclick="add('/')">/</button>
            <button type="button" onclick="add('+')">+</button>

            <button type="button" onclick="add('4')">4</button>
            <button type="button" onclick="add('5')">5</button>
            <button type="button" onclick="add('6')">6</button>
            <button type="button" onclick="add('*')">*</button>

            <button type="button" onclick="add('1')">1</button>
            <button type="button" onclick="add('2')">2</button>
            <button type="button" onclick="add('3')">3</button>
            <button type="button" onclick="add('-')">-</button>

            <button type="button" onclick="add('0')">0</button>
            <button type="button" onclick="add('.')">.</button>
            <button type="button" onclick="add('(')">(</button>
            <button type="button" onclick="add(')')">)</button>

            <button type="button" onclick="clearDisplay()">C</button>
            <button type="submit" class="equal">=</button>
        </div>
    </form>
</div>

<script>
    function add(value) {
        document.getElementById("display").value += value;
    }

    function clearDisplay() {
        document.getElementById("display").value = "";
    }
</script>

</body>
</html>
